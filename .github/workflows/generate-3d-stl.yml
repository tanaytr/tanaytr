name: Generate Interactive 3D STL
on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Generate Skyline STL
        run: |
          gh extension install github/gh-skyline
          # We use the official output flag instead of redirection to ensure binary integrity
          gh skyline --user tanaytr --year 2025 --output tanaytr-2025-skyline.stl
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          if [ -f tanaytr-2025-skyline.stl ]; then
            git add tanaytr-2025-skyline.stl
            git commit -m "Update 3D Skyline STL" || echo "No changes"
            git push
          fi

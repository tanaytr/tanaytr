- name: Generate Skyline STL
        run: |
          # 1. Install the extension
          gh extension install github/gh-skyline
          
          # 2. Run the command and redirect output to the file
          # We use --year 2025 as requested for your profile
          gh skyline --user tanaytr --year 2025 > tanaytr-2025-skyline.stl
          
          # 3. Verify the file size (must be > 0 bytes)
          if [ -s tanaytr-2025-skyline.stl ]; then
            echo "Successfully generated tanaytr-2025-skyline.stl"
            ls -lh tanaytr-2025-skyline.stl
          else
            echo "Error: Skyline file is empty or was not created."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add tanaytr-2025-skyline.stl
          git commit -m "Update 3D Skyline STL" || echo "No changes to commit"
          git push
